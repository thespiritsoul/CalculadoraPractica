<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/calculadora.css">
    <link rel="stylesheet" href="./css/botones.css">
    <title>CalculadoraPractica</title>
</head>
<body>
    <div class="calculadora">
        <section class="historial">
            <h1 class="tituloHistorial">Historial</h1>
            <div class="containerHistorial" id="containerHistorial">
            </div>
        </section>
            <section class="display" id="displayPrincipal"><div class="cursor"></div></section>
        <section class="botones">
            <button onclick="botonClick('^')" class="boton">^</button>
            <button onclick="botonClick('cua')" class="boton">&#178;&radic;</button>
            <button onclick="botonClick('sqrt')" class="boton">&radic;</button>
            <button onclick="botonClick('izq')" class="boton">&#60;-</button>
            <button onclick="botonClick('der')" class="boton">-&#62;</button>
            <button onclick="botonClick('pIzq')" class="boton">(</button>
            <button onclick="botonClick('pDer')" class="boton">)</button>
            <button onclick="botonClick('!')" class="boton">n!</button>
            <button onclick="botonClick('CE')" class="boton">CE</button>
            <button onclick="botonClick('Clear')" class="boton">C</button>
            <button onclick="botonClick('7')" class="boton siete">7</button>
            <button onclick="botonClick('8')" class="boton ocho">8</button>
            <button onclick="botonClick('9')" class="boton nueve">9</button>
            <button onclick="botonClick('-')" class="boton">-</button>
            <button onclick="botonClick('%')" class="boton">%</button>
            <button onclick="botonClick('4')" class="boton cuatro">4</button>
            <button onclick="botonClick('5')" class="boton cinco">5</button>
            <button onclick="botonClick('6')" class="boton seis">6</button>
            <button onclick="botonClick('+')" class="boton suma">+</button>
            <button onclick="botonClick('*')" class="boton">*</button>
            <button onclick="botonClick('1')" class="boton uno">1</button>
            <button onclick="botonClick('2')" class="boton dos">2</button>
            <button onclick="botonClick('3')" class="boton tres">3</button>
            <button onclick="botonClick('/')" class="boton">/</button>
            <button onclick="botonClick('.')" class="boton p">.</button>
            <button onclick="botonClick('0')" class="boton cero">0</button>
            <button onclick="botonClick('ANS')" class="boton ans">ANS</button>
            <button onclick="botonClick('=')" class="boton igual">=</button>
        </section>
    </div>

    <script type="module" src="./js/botones.js"></script>
    <script type="module" src="./js/display.js"></script>

    <script type="module" src="./js/logica/evaluator.js"></script>
    <script type="module" src="./js/logica/index.js"></script>
    <script type="module" src="./js/logica/mathUtils.js"></script>
    <script type="module" src="./js/logica/normalize.js"></script>
    <script type="module" src="./js/logica/parser.js"></script>
    <script type="module" src="./js/logica/tokenizer.js"></script>

</body>
</html>
